name: Build and Test

permissions:
  contents: write
  statuses: write
  actions: read

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'LICENSE'
      - 'docs/**'
      - 'README.md'
      - 'AUTHORS'
  workflow_dispatch:

jobs:
  build-and-test:
    if: (github.event.issue.pull_request && contains(github.event.comment.body, '/run tests')) || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request_target'
    uses: zopencommunity/meta/.github/workflows/build_and_test.yml@main
    secrets: inherit
    with:
      repo: 'https://github.com/zopencommunity/libdioport.git'
      use_prbranch_as_build_branch: true
      use_pr_source_url: true
